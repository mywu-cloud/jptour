<head>

<title>櫻花前線 | 日本旅遊情報站</title>
<meta name="description" content="全國46個氣象觀測地點的日本櫻花開花前線互動地圖，涵蓋2010–2026年開花與滿開歷史紀錄。">

<style>
  :root{
    --bg-page:#fdf1f4;
    --bg-panel:#fffbfc;
    --bg-panel-2:#fbe4ec;
    --line:#f2cedb;
    --text-main:#4a2c35;
    --text-dim:#8a6270;
    --sakura-bud:#7c8ea0;
    --sakura-light:#ffd9e6;
    --sakura-mid:#ff9fb8;
    --sakura-full:#ff5d82;
    --sakura-peak:#c9556f;
    --gold:#c9557a;
    --font-display:'Helvetica Neue', 'Noto Sans TC', sans-serif;
    --font-body:'Helvetica Neue', 'Noto Sans TC', sans-serif;
  }
  *{box-sizing:border-box;}
  #sakuraApp{display:flex;flex-direction:column;height:calc(100vh - 66px);background:var(--bg-page);color:var(--text-main);font-family:var(--font-body);font-size:14px;}

  /* ---------- Header ---------- */
  .sakura-hero{
position:relative;
padding:18px 28px 16px;
background:linear-gradient(135deg,#ffe4ec 0%,#ffeef2 55%,#ffe4ec 100%);
border-bottom:1px solid var(--line);
overflow:hidden;
flex-shrink:0;
}
.sakura-hero .petals{position:absolute;inset:0;pointer-events:none;opacity:.5;}
  .petal{position:absolute;top:-10px;font-size:14px;color:var(--sakura-peak);animation:fall linear infinite;opacity:.6;}
  @keyframes fall{
    0%{transform:translateY(-10px) translateX(0) rotate(0deg);opacity:0;}
    10%{opacity:.8;}
    100%{transform:translateY(120px) translateX(30px) rotate(300deg);opacity:0;}
  }
  .sakura-hero h1{
    margin:0;font-family:var(--font-display);font-weight:900;font-size:26px;letter-spacing:.04em;
    color:var(--text-main);position:relative;z-index:1;
  }
  .sakura-hero h1 span{color:var(--sakura-peak);}
  .sakura-hero p.sub{margin:4px 0 0;font-size:14px;color:var(--text-dim);position:relative;z-index:1;letter-spacing:.02em;}

  /* ---------- Controls ---------- */
  .controls{
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:12px 28px;background:var(--bg-panel);border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .ctrl-group{display:flex;align-items:center;gap:8px;}
  .ctrl-label{font-size:14px;color:var(--text-dim);white-space:nowrap;letter-spacing:.03em;}
  #sakuraApp select{
background:var(--bg-panel-2);color:var(--text-main);border:1px solid var(--line);
border-radius:6px;padding:6px 10px;font-family:var(--font-body);font-size:14px;
}
#sakuraApp select:focus{outline:1px solid var(--sakura-full);}
  #dateSlider{width:280px;accent-color:var(--sakura-full);}
  .date-badge{
    font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--gold);
    min-width:64px;display:inline-block;
  }
  button.play-btn{
    background:var(--sakura-full);border:none;color:#3a1520;font-weight:700;
    padding:7px 16px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-size:14px;
    transition:transform .15s ease, background .15s ease;
  }
  button.play-btn:hover{background:var(--sakura-mid);transform:translateY(-1px);}
  button.reset-btn{
    background:transparent;border:1px solid var(--line);color:var(--text-dim);
    padding:6px 14px;border-radius:20px;cursor:pointer;font-size:14px;font-family:var(--font-body);
  }
  button.reset-btn:hover{border-color:var(--sakura-mid);color:var(--sakura-mid);}
  .stat-pill{
    margin-left:auto;font-size:14px;color:var(--text-dim);background:var(--bg-panel-2);
    padding:6px 14px;border-radius:20px;border:1px solid var(--line);
  }
  .stat-pill b{color:var(--sakura-full);font-family:var(--font-display);}

  /* ---------- Main layout ---------- */
  .sakura-main{flex:1;display:flex;min-height:0;}
  #map{flex:1;min-width:0;background:#eee;}
  aside{
    width:300px;flex-shrink:0;background:var(--bg-panel);border-left:1px solid var(--line);
    overflow-y:auto;padding:16px 18px 24px;
  }
  aside h2{
    font-family:var(--font-display);font-size:14px;margin:0 0 10px;color:var(--gold);
    letter-spacing:.05em;border-bottom:1px solid var(--line);padding-bottom:6px;
    text-transform:none;font-weight:700;
  }
  .legend-row{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-dim);margin-bottom:6px;}
  .legend-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15);}

  #trendChartWrap{margin-top:18px;}
  #cityList{margin-top:6px;font-size:14px;}
  .city-row{
    display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--line);
    color:var(--text-main);
  }
  .city-row .cname{color:var(--text-main);}
  .city-row .cdate{color:var(--sakura-peak);font-family:var(--font-display);font-weight:700;}
  .city-row.pending .cdate{color:var(--text-dim);}

  .leaflet-popup-content-wrapper{
    background:var(--bg-panel);color:var(--text-main);border-radius:10px;
    border:1px solid var(--line);
  }
  .leaflet-popup-tip{background:var(--bg-panel);}
  .popup-title{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--sakura-peak);margin-bottom:4px;}
  .popup-pref{font-size:14px;color:var(--text-dim);margin-bottom:8px;}
  .popup-row{font-size:14px;display:flex;justify-content:space-between;padding:2px 0;gap:10px;}
  .popup-row .k{color:var(--text-dim);}
  .popup-row .v{color:var(--text-main);font-weight:600;}
  .popup-hist{margin-top:6px;padding-top:6px;border-top:1px solid var(--line);font-size:14px;color:var(--text-dim);}

  .sakura-footer{
flex-shrink:0;padding:8px 28px;background:var(--bg-panel);border-top:1px solid var(--line);
font-size:14px;color:var(--text-dim);display:flex;justify-content:space-between;
}
  a.src-link{color:var(--sakura-peak);text-decoration:none;}
  a.src-link:hover{text-decoration:underline;}

  @media (max-width:820px){
    aside{display:none;}
    .controls{gap:10px;}
    #dateSlider{width:160px;}
  }
</style>
</head>

        <div id="cityList"></div>
      </div>
    </aside>
  </div>

</div>

<script>
// ---------- Helpers ----------
const YEARS = [];
for (let y = 2026; y >= 2010; y--) YEARS.push(y);

const MONTH_DAYS = [31,28,31,30,31,30,31,31,30,31,30,31];
function doyToMMDD(doy){
  let d = doy;
  for (let m=0; m<12; m++){
    if (d <= MONTH_DAYS[m]) return (m+1)+'/'+d;
    d -= MONTH_DAYS[m];
  }
  return '--/--';
}

function lerpColor(a, b, t){
  t = Math.max(0, Math.min(1, t));
  const ah = a.match(/\w\w/g).map(x=>parseInt(x,16));
  const bh = b.match(/\w\w/g).map(x=>parseInt(x,16));
  const rh = ah.map((v,i)=>Math.round(v + (bh[i]-v)*t));
  return '#'+rh.map(v=>v.toString(16).padStart(2,'0')).join('');
}

const COL_BUD = '#5c6b7a';
const COL_LIGHT = '#ffd9e6';
const COL_MID = '#ff9fb8';
const COL_FULL = '#ff5d82';
const COL_PEAK = '#c9556f';

// returns {color, radius, phase} for a city on a given selected day-of-year & year
function bloomState(entry, year, selDoy){
  const yd = entry.years[String(year)];
  if (!yd || !yd.kaika_doy){
    return {color: COL_BUD, radius: 5, fill: false, phase:'no-data'};
  }
  const k = yd.kaika_doy;
  const m = yd.mankai_doy || (k + 7); // fallback if mankai missing
  if (selDoy < k){
    return {color: COL_BUD, radius: 5, fill:false, phase:'bud'};
  }
  if (selDoy <= m){
    const t = (m > k) ? (selDoy - k) / (m - k) : 1;
    const color = t < 0.5 ? lerpColor(COL_LIGHT, COL_MID, t/0.5) : lerpColor(COL_MID, COL_FULL, (t-0.5)/0.5);
    const radius = 6 + t*4;
    return {color, radius, fill:true, phase: t < 0.15 ? 'opening' : (t>0.85?'full':'blooming')};
  }
  // past peak - fade toward peak/dusty rose over ~14 days
  const daysPast = selDoy - m;
  const t2 = Math.min(1, daysPast/14);
  const color = lerpColor(COL_FULL, COL_PEAK, t2);
  const radius = 10 - t2*2.5;
  return {color, radius, fill:true, phase:'past'};
}

// ---------- Map setup ----------
const map = L.map('map', {zoomControl:true, attributionControl:true}).setView([37.5, 138.5], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 12
}).addTo(map);

const markers = {};
SAKURA_DATA.forEach(entry => {
  const m = L.circleMarker([entry.lat, entry.lon], {
    radius: 5, color:'#fff', weight:1, fillColor: COL_BUD, fillOpacity:0.9
  }).addTo(map);
  m.bindPopup('', {maxWidth:230});
  m.on('click', () => renderPopup(entry));
  markers[entry.city] = m;
});

function renderPopup(entry){
  const y = state.year;
  const yd = entry.years[String(y)] || {};
  const html = `
    <div class="popup-title">${entry.city}</div>
    <div class="popup-pref">${entry.pref}</div>
    <div class="popup-row"><span class="k">${y}年 開花日</span><span class="v">${yd.kaika || '無資料'}</span></div>
    <div class="popup-row"><span class="k">${y}年 滿開日</span><span class="v">${yd.mankai || '無資料'}</span></div>
    <div class="popup-hist">
      <div class="popup-row"><span class="k">歷年最早開花</span><span class="v">${entry.earliest||'-'}</span></div>
      <div class="popup-row"><span class="k">歷年最晚開花</span><span class="v">${entry.latest||'-'}</span></div>
      <div class="popup-row"><span class="k">歷年平均開花</span><span class="v">${entry.avg||'-'}</span></div>
    </div>`;
  markers[entry.city].setPopupContent(html).openPopup();
}

// ---------- State & controls ----------
const state = { year: 2026, doy: 100, playing: false, timer: null };

const yearSelect = document.getElementById('yearSelect');
YEARS.forEach(y => {
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y + ' 年';
  yearSelect.appendChild(opt);
});
yearSelect.value = state.year;

const dateSlider = document.getElementById('dateSlider');
const dateBadge = document.getElementById('dateBadge');
const statCount = document.getElementById('statCount');
const cityListEl = document.getElementById('cityList');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');

function render(){
  dateSlider.value = state.doy;
  dateBadge.textContent = doyToMMDD(state.doy);
  let bloomedCount = 0;
  SAKURA_DATA.forEach(entry => {
    const s = bloomState(entry, state.year, state.doy);
    const mk = markers[entry.city];
    mk.setStyle({
      fillColor: s.color,
      fillOpacity: s.fill ? 0.92 : 0.35,
      color: s.fill ? '#ffffff' : '#8a97a3',
      weight: s.phase === 'opening' ? 2 : 1
    });
    mk.setRadius(s.radius);
    if (s.phase !== 'bud' && s.phase !== 'no-data') bloomedCount++;
  });
  statCount.textContent = bloomedCount;
  renderCityList();
}

function renderCityList(){
  const y = state.year;
  const rows = SAKURA_DATA.map(e => {
    const yd = e.years[String(y)] || {};
    return {city: e.city, pref: e.pref, doy: yd.kaika_doy, date: yd.kaika};
  }).sort((a,b) => (a.doy||999) - (b.doy||999));
  cityListEl.innerHTML = rows.map(r => {
    const pending = !r.doy || r.doy > state.doy;
    return `<div class="city-row ${pending?'pending':''}">
      <span class="cname">${r.city}</span>
      <span class="cdate">${r.date || '無資料'}</span>
    </div>`;
  }).join('');
}

yearSelect.addEventListener('change', () => {
  state.year = parseInt(yearSelect.value, 10);
  render();
});

dateSlider.addEventListener('input', () => {
  state.doy = parseInt(dateSlider.value, 10);
  render();
});

resetBtn.addEventListener('click', () => {
  stopPlay();
  state.doy = 60;
  render();
});

function stopPlay(){
  state.playing = false;
  playBtn.textContent = '▶ 播放花期';
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
}
function startPlay(){
  state.playing = true;
  playBtn.textContent = '⏸ 暫停';
  if (state.doy >= 150) state.doy = 60;
  state.timer = setInterval(() => {
    state.doy += 1;
    if (state.doy > 150){ stopPlay(); return; }
    render();
  }, 140);
}
playBtn.addEventListener('click', () => {
  if (state.playing) stopPlay(); else startPlay();
});

// ---------- Trend chart: national average first-bloom day by year ----------
const trendYears = [...YEARS].sort((a,b)=>a-b);
const trendAvg = trendYears.map(y => {
  const vals = SAKURA_DATA.map(e => e.years[String(y)] && e.years[String(y)].kaika_doy).filter(v=>v);
  if (!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0) / vals.length;
});

const ctx = document.getElementById('trendChart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    labels: trendYears,
    datasets: [{
      label: '全國平均開花日 (day-of-year)',
      data: trendAvg,
      borderColor: '#ff5d82',
      backgroundColor: 'rgba(255,93,130,0.15)',
      pointRadius: 2,
      pointBackgroundColor: '#ffd9e6',
      tension: 0.3,
      fill: true,
      spanGaps: true
    }]
  },
  options: {
    responsive:true,
    plugins:{ legend:{display:false} },
    scales:{
      x:{ ticks:{ color:'#8a6270', font:{size:14} }, grid:{ color:'rgba(0,0,0,0.05)' } },
      y:{ ticks:{ color:'#8a6270', font:{size:14}, callback:(v)=>doyToMMDD(v) }, grid:{ color:'rgba(0,0,0,0.05)' } }
    }
  }
});

// ---------- Header petal decoration ----------
const petalsEl = document.getElementById('petals');
for (let i=0;i<14;i++){
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = '❀';
  p.style.left = (Math.random()*100)+'%';
  p.style.animationDuration = (4+Math.random()*4)+'s';
  p.style.animationDelay = (Math.random()*5)+'s';
  p.style.fontSize = (10+Math.random()*8)+'px';
  petalsEl.appendChild(p);
}

// initial render
render();

</script>
</body>
</html>
